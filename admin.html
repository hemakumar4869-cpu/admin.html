<style>
:root{
  --void:#050208; --void-2:#0a0512; --ink:#0d0818;
  --gold:#E8C05A; --gold-deep:#B8862E; --gold-bright:#FFE9A8;
  --purple:#4B1F82; --purple-deep:#241040; --purple-glow:#7C3FC9;
  --blue:#3FC7E8; --blue-deep:#1F6FA8;
  --paper:#F3EEE3; --paper-dim:#B8AFA0;
  --danger:#ff5468; --success:#3fe89a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--void);color:var(--paper);font-family:'Manrope',sans-serif;min-height:100vh;}
h1,h2,h3,.font-display{font-family:'Cinzel',serif;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--void);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold-deep),var(--purple));border-radius:4px;}
button{font-family:'Manrope',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'Manrope',sans-serif;}
.gold-text{color:var(--gold);}
.hidden{display:none !important;}

/* ---------- BACKDROP ---------- */
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(75,31,130,0.28), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 10%, rgba(63,199,232,0.12), transparent 60%),
    var(--void);
}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  width:100%;max-width:400px;padding:48px 36px;
  background:linear-gradient(160deg, rgba(75,31,130,0.16), rgba(10,5,18,0.6));
  border:1px solid rgba(232,192,90,0.18);border-radius:14px;backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}
.login-badge{
  width:64px;height:64px;border-radius:50%;margin:0 auto 20px;
  background:radial-gradient(circle,rgba(232,192,90,0.2),transparent 70%);
  border:1px solid rgba(232,192,90,0.4);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--gold);
}
.login-card h1{text-align:center;font-size:22px;letter-spacing:0.06em;margin-bottom:4px;}
.login-card .sub{text-align:center;color:var(--paper-dim);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--paper-dim);margin-bottom:8px;}
.field input{
  width:100%;padding:13px 15px;background:rgba(255,255,255,0.03);
  border:1px solid rgba(232,192,90,0.18);border-radius:8px;color:var(--paper);font-size:14px;outline:none;
  transition:border-color .3s ease;
}
.field input:focus{border-color:var(--gold);}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:12.5px;color:var(--paper-dim);}
.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-row input{accent-color:var(--gold);}
.row-between a{color:var(--blue);text-decoration:none;}
.btn-gold{
  width:100%;padding:14px;border:none;border-radius:8px;
  background:linear-gradient(120deg,var(--gold-deep),var(--gold),var(--gold-deep));
  background-size:200% auto;color:#100a1e;font-weight:700;letter-spacing:0.08em;font-size:13px;text-transform:uppercase;
  transition:background-position .5s ease, box-shadow .3s ease;
}
.btn-gold:hover{background-position:100% center;box-shadow:0 0 30px rgba(232,192,90,0.4);}
.login-error{
  background:rgba(255,84,104,0.1);border:1px solid rgba(255,84,104,0.35);color:var(--danger);
  padding:10px 14px;border-radius:8px;font-size:12.5px;margin-bottom:18px;
}
.login-hint{margin-top:22px;text-align:center;font-size:11px;color:var(--paper-dim);opacity:.7;}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;grid-template-columns:250px 1fr;}
#app.show{display:grid;}
@media(max-width:880px){#app.show{grid-template-columns:1fr;}}

/* ---------- SIDEBAR ---------- */
.sidebar{
  background:rgba(8,5,15,0.6);border-right:1px solid rgba(232,192,90,0.1);
  backdrop-filter:blur(20px);padding:24px 16px;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;z-index:50;
}
@media(max-width:880px){
  .sidebar{position:fixed;left:0;top:0;width:250px;transform:translateX(-100%);transition:transform .35s ease;}
  .sidebar.open{transform:translateX(0);}
}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:8px 8px 26px;border-bottom:1px solid rgba(232,192,90,0.1);margin-bottom:18px;}
.sidebar-brand .dot{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,rgba(232,192,90,0.25),transparent 70%);border:1px solid rgba(232,192,90,0.4);display:flex;align-items:center;justify-content:center;color:var(--gold);font-family:'Cinzel',serif;font-weight:700;}
.sidebar-brand span{font-family:'Cinzel',serif;font-weight:700;font-size:14px;letter-spacing:0.05em;}
.sidebar-brand small{display:block;color:var(--paper-dim);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:8px;color:var(--paper-dim);
  text-decoration:none;font-size:13px;margin-bottom:2px;cursor:pointer;transition:all .25s ease;border:1px solid transparent;
}
.nav-item .ic{width:18px;text-align:center;font-size:14px;}
.nav-item:hover{background:rgba(232,192,90,0.06);color:var(--paper);}
.nav-item.active{background:linear-gradient(90deg,rgba(232,192,90,0.14),rgba(75,31,130,0.14));color:var(--gold);border-color:rgba(232,192,90,0.25);}
.sidebar-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(232,192,90,0.1);}

/* ---------- MAIN ---------- */
.main{padding:26px clamp(16px,3vw,40px) 60px;overflow-x:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:14px;}
.topbar .mobile-toggle{display:none;background:rgba(255,255,255,0.04);border:1px solid rgba(232,192,90,0.2);border-radius:8px;padding:8px 12px;color:var(--paper);}
@media(max-width:880px){.topbar .mobile-toggle{display:block;}}
.topbar h2{font-size:20px;letter-spacing:0.03em;}
.admin-chip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(232,192,90,0.15);padding:8px 14px;border-radius:30px;font-size:12.5px;}
.admin-chip .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--purple-glow));}

/* Dashboard cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;margin-bottom:36px;}
.stat-card{
  padding:22px;border-radius:12px;background:linear-gradient(160deg, rgba(75,31,130,0.14), rgba(10,5,18,0.55));
  border:1px solid rgba(232,192,90,0.14);position:relative;overflow:hidden;transition:transform .3s ease,border-color .3s ease;
}
.stat-card:hover{transform:translateY(-4px);border-color:rgba(232,192,90,0.35);}
.stat-card .ic{font-size:20px;color:var(--gold);margin-bottom:14px;}
.stat-card .num{font-family:'Cinzel',serif;font-size:28px;color:var(--paper);}
.stat-card .lbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--paper-dim);margin-top:6px;}
.stat-card .badge{position:absolute;top:18px;right:18px;font-size:9px;padding:4px 9px;border-radius:20px;letter-spacing:0.08em;text-transform:uppercase;}
.badge-on{background:rgba(63,232,154,0.12);color:var(--success);border:1px solid rgba(63,232,154,0.3);}
.badge-off{background:rgba(255,84,104,0.1);color:var(--danger);border:1px solid rgba(255,84,104,0.3);}

/* Panels */
.panel{
  background:linear-gradient(160deg, rgba(75,31,130,0.1), rgba(10,5,18,0.5));
  border:1px solid rgba(232,192,90,0.12);border-radius:14px;padding:26px clamp(16px,3vw,30px);margin-bottom:24px;
}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.panel-head h3{font-size:16px;letter-spacing:0.03em;}
.panel-head p{color:var(--paper-dim);font-size:12.5px;margin-top:4px;}

.grid-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
.f-field{display:flex;flex-direction:column;gap:7px;}
.f-field.full{grid-column:1/-1;}
.f-field label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--paper-dim);}
.f-field input,.f-field textarea,.f-field select{
  padding:11px 13px;background:rgba(255,255,255,0.03);border:1px solid rgba(232,192,90,0.16);
  border-radius:8px;color:var(--paper);font-size:13.5px;outline:none;transition:border-color .3s ease;
}
.f-field input:focus,.f-field textarea:focus,.f-field select:focus{border-color:var(--gold);}
.f-field textarea{resize:vertical;min-height:70px;}

.btn{padding:10px 20px;border-radius:8px;border:1px solid rgba(232,192,90,0.3);background:transparent;color:var(--gold);font-size:12.5px;letter-spacing:0.05em;transition:all .25s ease;}
.btn:hover{background:rgba(232,192,90,0.1);}
.btn-solid{
  border:none;background:linear-gradient(120deg,var(--gold-deep),var(--gold));color:#100a1e;font-weight:700;
}
.btn-solid:hover{box-shadow:0 0 22px rgba(232,192,90,0.35);}
.btn-danger{border:1px solid rgba(255,84,104,0.35);color:var(--danger);background:transparent;}
.btn-danger:hover{background:rgba(255,84,104,0.1);}
.btn-sm{padding:7px 14px;font-size:11.5px;}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}

.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;padding:14px 22px;border-radius:10px;
  background:rgba(10,5,18,0.95);border:1px solid rgba(63,232,154,0.4);color:var(--success);font-size:13px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);transform:translateY(20px);opacity:0;transition:all .35s ease;
  display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateY(0);opacity:1;}

/* Repeater list items */
.list-item{
  display:flex;gap:16px;align-items:flex-start;padding:18px;border-radius:10px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(232,192,90,0.1);margin-bottom:14px;flex-wrap:wrap;
}
.list-item .thumb{width:56px;height:56px;border-radius:8px;background:rgba(232,192,90,0.08);border:1px solid rgba(232,192,90,0.2);flex-shrink:0;object-fit:cover;display:flex;align-items:center;justify-content:center;color:var(--paper-dim);font-size:10px;overflow:hidden;}
.list-item .thumb img{width:100%;height:100%;object-fit:cover;}
.list-item .content{flex:1;min-width:180px;}
.list-item .content h4{font-family:'Cinzel',serif;font-size:14.5px;margin-bottom:4px;}
.list-item .content .meta{color:var(--paper-dim);font-size:12px;line-height:1.6;}
.list-item .actions{display:flex;gap:8px;align-items:flex-start;}
.pin-tag{display:inline-block;font-size:9px;padding:3px 9px;border-radius:20px;background:rgba(232,192,90,0.14);color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-left:8px;}

.section-tabs{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
.section-tab{padding:8px 16px;border-radius:20px;font-size:12px;border:1px solid rgba(232,192,90,0.2);color:var(--paper-dim);background:transparent;}
.section-tab.active{background:rgba(232,192,90,0.14);color:var(--gold);border-color:rgba(232,192,90,0.4);}

.empty-state{text-align:center;padding:40px 20px;color:var(--paper-dim);font-size:13px;}
.file-drop{
  border:1.5px dashed rgba(232,192,90,0.3);border-radius:10px;padding:26px;text-align:center;color:var(--paper-dim);
  font-size:12.5px;cursor:pointer;transition:all .25s ease;
}
.file-drop:hover{border-color:var(--gold);color:var(--gold);}
.status-pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;padding:6px 14px;border-radius:20px;}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);}
.dot-off{width:7px;height:7px;border-radius:50%;background:var(--danger);}
.toggle-switch{position:relative;width:46px;height:24px;background:rgba(255,255,255,0.08);border-radius:14px;cursor:pointer;border:1px solid rgba(232,192,90,0.2);transition:background .3s ease;}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--paper-dim);transition:all .3s ease;}
.toggle-switch.on{background:rgba(63,232,154,0.2);border-color:rgba(63,232,154,0.4);}
.toggle-switch.on .knob{left:24px;background:var(--success);}

/* ================================================================
   CINEMATIC 3D BACKGROUND + LUXURY INTRO
   (added without touching any existing markup, styles or JS above)
================================================================ */
body{ background:var(--void) !important; }

#bg3d-canvas{
  position:fixed; inset:0; width:100vw; height:100vh; z-index:0;
  display:block; background:var(--void);
}
#login-screen, #app{ position:relative; z-index:1; }
#login-screen{ background:transparent; }

.cursor-glow{
  position:fixed; top:0; left:0; width:26px; height:26px; border-radius:50%;
  pointer-events:none; z-index:9998; transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(232,192,90,0.55), rgba(124,63,201,0.25) 55%, transparent 75%);
  filter:blur(1px); mix-blend-mode:screen; transition:opacity .3s ease;
  will-change:transform;
}
@media(max-width:880px),(hover:none){ .cursor-glow{ display:none; } }

.tilt-el{ transition:transform .12s ease-out; transform-style:preserve-3d; will-change:transform; }

.btn, .btn-gold, .btn-solid, .btn-danger, .nav-item{ position:relative; overflow:hidden; }
.ripple-dot{
  position:absolute; border-radius:50%; background:rgba(232,192,90,0.45);
  transform:scale(0); animation:rippleAnim .6s ease-out forwards; pointer-events:none;
}
@keyframes rippleAnim{ to{ transform:scale(1); opacity:0; } }

/* ---------- LUXURY OPENING INTRO ---------- */
#intro-overlay{
  position:fixed; inset:0; z-index:9999; background:#000;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
  transition:opacity 1.1s ease, visibility 1.1s ease;
}
#intro-overlay.intro-out{ opacity:0; visibility:hidden; pointer-events:none; }
.intro-logo-wrap{
  position:relative; width:132px; height:132px; display:flex; align-items:center; justify-content:center;
  margin-bottom:28px; opacity:0; transform:translateY(14px) scale(.92);
  animation:introLogoIn 1.6s cubic-bezier(.16,.8,.3,1) .3s forwards;
}
@keyframes introLogoIn{ to{ opacity:1; transform:translateY(0) scale(1); } }
.intro-logo-ring{
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(232,192,90,0.35);
  animation:introRingSpin 14s linear infinite;
}
.intro-logo-ring.r2{ inset:-16px; border-color:rgba(124,63,201,0.3); animation-duration:20s; animation-direction:reverse; }
.intro-logo-ring.r3{ inset:-32px; border-color:rgba(63,199,232,0.22); animation-duration:26s; }
@keyframes introRingSpin{ to{ transform:rotate(360deg); } }
.intro-logo-core{
  width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-weight:700; font-size:34px; color:var(--gold-bright);
  background:radial-gradient(circle, rgba(232,192,90,0.28), rgba(75,31,130,0.12) 60%, transparent 75%);
  box-shadow:0 0 40px rgba(232,192,90,0.45), 0 0 90px rgba(124,63,201,0.35), inset 0 0 20px rgba(255,233,168,0.25);
  animation:introFloat 4.5s ease-in-out infinite;
}
@keyframes introFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
.intro-text-1{
  font-family:'Cinzel',serif; font-weight:700; font-size:clamp(24px,5vw,40px); letter-spacing:0.14em;
  color:var(--paper); opacity:0; transform:translateY(10px);
  animation:introTextIn 1s ease 1.5s forwards;
}
.intro-text-1 span{ color:var(--gold); }
.intro-text-2{
  margin-top:10px; font-size:12.5px; letter-spacing:0.3em; text-transform:uppercase; color:var(--paper-dim);
  opacity:0; transform:translateY(8px);
  animation:introTextIn 1s ease 2.1s forwards;
}
@keyframes introTextIn{ to{ opacity:1; transform:translateY(0); } }
.intro-loading{
  width:180px; height:2px; margin-top:34px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden;
  opacity:0; animation:introTextIn .8s ease 2.6s forwards;
}
.intro-loading-bar{
  height:100%; width:0%; background:linear-gradient(90deg,var(--gold-deep),var(--gold),var(--blue));
  animation:introLoadBar 2.2s ease 2.7s forwards;
}
@keyframes introLoadBar{ to{ width:100%; } }
.intro-enter-btn{
  margin-top:30px; padding:13px 34px; border-radius:30px; border:1px solid rgba(232,192,90,0.4);
  background:rgba(232,192,90,0.08); color:var(--gold); font-size:12px; letter-spacing:0.2em; text-transform:uppercase;
  opacity:0; animation:introTextIn .8s ease 4.9s forwards, introPulse 2.4s ease 5.7s infinite;
}
.intro-enter-btn:hover{ background:rgba(232,192,90,0.18); box-shadow:0 0 30px rgba(232,192,90,0.35); }
@keyframes introPulse{ 0%,100%{ box-shadow:0 0 0 rgba(232,192,90,0.25); } 50%{ box-shadow:0 0 24px rgba(232,192,90,0.35); } }
.intro-skip{
  position:absolute; bottom:22px; right:26px; font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--paper-dim); opacity:0.55; background:transparent; border:none; padding:6px;
}
.intro-mute{
  position:absolute; bottom:22px; left:26px; font-size:14px; color:var(--paper-dim); opacity:.6;
  background:transparent; border:1px solid rgba(255,255,255,0.15); border-radius:50%; width:34px; height:34px;
}
@media(prefers-reduced-motion:reduce){
  #bg3d-canvas{ display:none; }
  .intro-logo-wrap, .intro-text-1, .intro-text-2, .intro-loading, .intro-enter-btn, .intro-logo-ring{ animation:none !important; opacity:1 !important; transform:none !important; }
}
</style>
</head>
<body>

<!-- ================= CINEMATIC 3D BACKDROP ================= -->
<canvas id="bg3d-canvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ================= LUXURY OPENING INTRO ================= -->
<div id="intro-overlay">
  <button class="intro-mute" id="introMute" title="Toggle ambient sound">♪</button>
  <div class="intro-logo-wrap">
    <div class="intro-logo-ring"></div>
    <div class="intro-logo-ring r2"></div>
    <div class="intro-logo-ring r3"></div>
    <div class="intro-logo-core">♛</div>
  </div>
  <div class="intro-text-1">EUPHORIA <span>2K26</span></div>
  <div class="intro-text-2">Freshers' Celebration</div>
  <div class="intro-loading"><div class="intro-loading-bar"></div></div>
  <button class="intro-enter-btn" id="introEnterBtn">Tap to Enter</button>
  <button class="intro-skip" id="introSkipBtn">Skip intro</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-badge">♛</div>

<script>
/* ======================================================================

   Data layer: window.storage (persistent, shared=true so content can
   later be read by the public homepage). Swap loadData/saveData for
   real Firebase/Mongo calls when you move to production hosting.
====================================================================== */

const NAV_ITEMS = [

  {key:'homepage', label:'Homepage', icon:'⌂'},
  {key:'about', label:'About Euphoria', icon:'✦'},

  {key:'dance', label:'Dance Participants', icon:'☾'},

/* ---------- STORAGE HELPERS (Firestore = source of truth, localStorage = cache/fallback) ---------- */
async function loadData(key, fallback){
  try{
    if(window.__fbDb){
      const snap = await window.__fbDb.collection('euphoria').doc(key).get();
      if(snap.exists){
        const value = snap.data().value;
        try{ localStorage.setItem('euphoria_'+key, JSON.stringify(value)); }catch(e){}
        return value;
      }
    }
  }catch(e){ /* offline / blocked — fall through to local cache */ }
  try{
    const raw = localStorage.getItem('euphoria_'+key);
    if(raw!==null) return JSON.parse(raw);
  }catch(e){}
  return fallback;
}
async function saveData(key, value){
  try{
    localStorage.setItem('euphoria_'+key, JSON.stringify(value));
  }catch(e){
    showToast('Save failed — try again', true);
    return false;
  }
  try{
    if(!window.__fbDb) throw new Error('Firestore unavailable');
    await window.__fbDb.collection('euphoria').doc(key).set({value, updatedAt: Date.now()});
    showToast('Saved & synced to website');
  }catch(e){
    showToast('Saved locally — will sync when online', true);
  }
  return true;
}
function showToast(msg, isError){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.style.borderColor = isError ? 'rgba(255,84,104,0.4)' : 'rgba(63,232,154,0.4)';
  t.style.color = isError ? 'var(--danger)' : 'var(--success)';
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- DEFAULT DATA ---------- */
const DEFAULTS = {
  homepage: {welcomeMessage:"A night of light, legacy and euphoria — where two campuses become one stage.", eventName:"EUPHORIA", subtitle:"Freshers' Celebration · 2K26", countdownDate:"2026-08-15T17:00:00", venue:"GITAM Grand Lawns, Delhi", heroText:"Welcome to the beginning of your story with us.", primaryBtn:"Explore Event", secondaryBtn:"View Schedule", bannerImageUrl:""},
  about: {heading:"About Euphoria", body:"Euphoria 2K26 is the official Freshers' Celebration hosted jointly by GITAM Junior College and International Delhi Public School.", campuses:2, freshers:"1200+", performances:"10+"},

  teams: [

  dance: [],
  colleges: {

    idps:{name:"International Delhi Public School", about:"", vision:"", mission:"", address:"", mapsLink:"", contact:"", principalMessage:"", campusPhotos:[]}
  },

let DATA = {};

async function loadAll(){
  DATA.homepage = await loadData('homepage-content', DEFAULTS.homepage);
  DATA.about = await loadData('about-content', DEFAULTS.about);

  DATA.live = await loadData('live-stream', DEFAULTS.live);

/* ---------- AUTH ---------- */
function attemptLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if(u === 'admin' && p === 'euphoria2026'){
    err.classList.add('hidden');
    sessionStorage_set('euphoria_admin_session','1');
    boot();
  }else{
    err.classList.remove('hidden');
  }
}
function logout(){
  sessionStorage_set('euphoria_admin_session','');
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}
// in-memory session flag (no browser storage per artifact rules)
let _session = false;
function sessionStorage_set(k,v){ _session = !!v; }

document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });

/* ---------- BOOT ---------- */
async function boot(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  renderNav();
  await loadAll();
  showSection('dashboard');
}
boot();

function renderNav(){
  const nav = document.getElementById('nav-list');
  nav.innerHTML = NAV_ITEMS.map(item=>{
    if(item.key==='teams'){
      return `<div class="nav-item ${item.key===currentSection?'active':''}" data-key="teams" onclick="showSection('teams')"><span class="ic">${item.icon}</span> ${item.label}</div>`;
    }
    return `<div class="nav-item ${item.key===currentSection?'active':''}" data-key="${item.key}" onclick="showSection('${item.key}')"><span class="ic">${item.icon}</span> ${item.label}</div>`;
  }).join('');
}

function showSection(key){
  currentSection = key;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.key===key));
  const titles = {dashboard:'Dashboard Overview', homepage:'Homepage Editor', about:'About Euphoria', schedule:'Event Schedule', teams:'Volunteer Teams', sports:'Sports', dance:'Dance Participants', colleges:'College Information', gallery:'Live Gallery', live:'Live Stream', announcements:'Announcements', contact:'Contact Details', settings:'Settings'};
  document.getElementById('page-title').textContent = titles[key] || 'Dashboard';
  document.getElementById('sidebar').classList.remove('open');
  const root = document.getElementById('content-root');
  root.innerHTML = '<div class="empty-state">Loading…</div>';
  const renderers = {dashboard:renderDashboard, homepage:renderHomepage, about:renderAbout, schedule:renderSchedule, teams:renderTeams, sports:renderSports, dance:renderDance, colleges:renderColleges, gallery:renderGallery, live:renderLive, announcements:renderAnnouncements, contact:renderContact, settings:renderSettings};

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const root = document.getElementById('content-root');
  root.innerHTML = `
    <div class="stat-grid">
      ${statCard('👥', '…', 'Total Volunteers')}
      ${statCard('⚑', DATA.sports_gitam.length + DATA.sports_idps.length, 'Sports Categories')}
      ${statCard('▧', DATA.gallery.length, 'Gallery Photos')}
      ${statCard('✉', DATA.announcements.length, 'Announcements')}
      ${statCard('●', DATA.live.enabled ? 'ON AIR' : 'Offline', 'Live Stream Status', DATA.live.enabled)}
      ${statCard('▦', DATA.schedule.file ? 'Uploaded' : 'Pending', 'Event Schedule Status', !!DATA.schedule.file)}
    </div>
    <div class="panel">
      <div class="panel-head"><div><h3>Quick Actions</h3><p>Jump straight into the most-edited sections</p></div></div>
      <div class="btn-row">
        <button class="btn btn-solid" onclick="showSection('announcements')">+ New Announcement</button>
        <button class="btn" onclick="showSection('gallery')">+ Upload Photos</button>

}
async function refreshVolunteerStat(){
  try{
    const members = await loadData('volunteer-members', []);
    const el = document.querySelector('.stat-grid .stat-card .num');
    if(el) el.textContent = members.length;

}
function statCard(icon,num,lbl,statusBool){
  let badge = '';
  if(statusBool !== undefined) badge = `<div class="badge ${statusBool?'badge-on':'badge-off'}">${statusBool?'Active':'Inactive'}</div>`;
  return `<div class="stat-card">${badge}<div class="ic">${icon}</div><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`;
}

/* ---------- HOMEPAGE EDITOR ---------- */

function renderAbout(){

/* ---------- SCHEDULE (file upload) ---------- */
function renderSchedule(){
  const d = DATA.schedule;
  document.getElementById('content-root').innerHTML = `
    <div class="panel">
      <div class="panel-head"><div><h3>Event Schedule File</h3><p>Upload a JPG, PNG or PDF of the full schedule. Replacing overwrites the previous file.</p></div></div>
      ${d.file ? `
        <div class="list-item">
          <div class="thumb">${d.fileType==='application/pdf' ? '📄' : `<img src="${d.file}">`}</div>
          <div class="content"><h4>${esc(d.fileName)}</h4><div class="meta">Uploaded ${d.uploadedAt ? new Date(d.uploadedAt).toLocaleString() : ''}</div></div>
          <div class="actions">
            <button class="btn btn-sm" onclick="previewSchedule()">Preview</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSchedule()">Delete</button>
          </div>
        </div>` : `<div class="empty-state">No schedule file uploaded yet.</div>`}
      <div class="file-drop" onclick="document.getElementById('sched-input').click()">Click to choose a JPG, PNG or PDF file (replaces existing)</div>
      <input type="file" id="sched-input" accept=".jpg,.jpeg,.png,.pdf" class="hidden" onchange="handleScheduleUpload(event)">
      <p style="color:var(--paper-dim);font-size:11.5px;margin-top:12px">Files are stored as embedded data — keep under ~2MB for reliable saving. For large PDFs in production, connect real cloud storage.</p>
    </div>`;
}
function handleScheduleUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 3*1024*1024){ showToast('File too large — keep under 3MB', true); return; }
  const reader = new FileReader();
  reader.onload = async () => {
    DATA.schedule = {file:reader.result, fileType:file.type, fileName:file.name, uploadedAt:Date.now()};
    await saveData('schedule-file', DATA.schedule);
    renderSchedule();
  };
  reader.readAsDataURL(file);
}
function previewSchedule(){ if(DATA.schedule.file) window.open(DATA.schedule.file, '_blank'); }
async function deleteSchedule(){
  DATA.schedule = {file:null, fileType:null, fileName:null, uploadedAt:null};
  await saveData('schedule-file', DATA.schedule);
  renderSchedule();
}

/* ---------- VOLUNTEER TEAMS (v2 — full committee/member manager, localStorage-backed) ---------- */
const VT_KEY = 'euphoria_volunteer_teams_v2';
let VT = {committees:[]};
let vtSearch = '';
let vtFormMode = null;      // 'committee' | 'member' | null
let vtEditCommitteeId = null;
let vtEditMemberId = null;
let vtDrag = null;          // {committeeId, memberId}

function vtLoad(){
  try{
    const raw = localStorage.getItem(VT_KEY);
    if(raw){ VT = JSON.parse(raw); }
  }catch(e){}
  if(!VT || !VT.committees){
    VT = {committees:[
      {id:uid(), name:'Food Committee', gender:'boys', photo:'', expanded:true, members:[]},
      {id:uid(), name:'Decoration Committee', gender:'girls', photo:'', expanded:true, members:[]}
    ]};
  }
  // pull the latest from Firestore in the background (source of truth across devices)
  (async()=>{
    try{
      if(!window.__fbDb) return;
      const snap = await window.__fbDb.collection('euphoria').doc('volunteer-teams-v2').get();
      if(snap.exists){
        VT = snap.data().value;
        try{ localStorage.setItem(VT_KEY, JSON.stringify(VT)); }catch(e){}
        if(document.getElementById('vt-grids')) vtRenderGrids();
      }
    }catch(e){ /* offline — keep showing local cache */ }
  })();
}
function vtSave(){
  try{ localStorage.setItem(VT_KEY, JSON.stringify(VT)); }catch(e){ showToast('Local storage save failed', true); return; }
  (async()=>{
    try{
      if(!window.__fbDb) throw new Error('Firestore unavailable');
      await window.__fbDb.collection('euphoria').doc('volunteer-teams-v2').set({value:VT, updatedAt:Date.now()});
      showToast('Saved & synced to website');
    }catch(e){ showToast('Saved locally — will sync when online', true); }
  })();
}
function vtCommittee(id){ return VT.committees.find(c=>c.id===id); }

function renderTeams(){
  vtLoad();
  const root = document.getElementById('content-root');
  root.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div><h3>Volunteer Teams</h3><p>Fully editable from here — add committees, assign leaders, move members between teams.</p></div>
        <button class="btn btn-solid btn-sm" onclick="vtOpenCommitteeForm()">➕ Add Committee</button>
      </div>
      <div class="f-field full" style="margin-bottom:4px">
        <label>🔎 Search</label>
        <input id="vt-search" placeholder="Search by committee or volunteer name..." oninput="vtSearch=this.value.toLowerCase();vtRenderGrids();">
      </div>
    </div>
    <div class="panel hidden" id="vt-form-panel"></div>
    <div id="vt-grids"></div>`;
  vtRenderGrids();
}

function vtFilteredCommittees(gender){
  return VT.committees.filter(c=>{
    if(c.gender!==gender) return false;
    if(!vtSearch) return true;
    if(c.name.toLowerCase().includes(vtSearch)) return true;
    return c.members.some(m=>m.name.toLowerCase().includes(vtSearch));
  });
}

function vtRenderGrids(){
  const wrap = document.getElementById('vt-grids');
  if(!wrap) return;
  wrap.innerHTML = vtGenderSection('boys','👦 Boys Committees') + vtGenderSection('girls','👧 Girls Committees');
  // native drag & drop for member reordering
  wrap.querySelectorAll('.vt-member-row').forEach(row=>{
    row.addEventListener('dragstart', e=>{
      vtDrag = {committeeId:row.dataset.committee, memberId:row.dataset.member};
      row.style.opacity='0.4';
    });
    row.addEventListener('dragend', ()=>{ row.style.opacity='1'; });
    row.addEventListener('dragover', e=>{ e.preventDefault(); });
    row.addEventListener('drop', e=>{
      e.preventDefault();
      if(!vtDrag || vtDrag.committeeId!==row.dataset.committee) return;
      const c = vtCommittee(row.dataset.committee); if(!c) return;
      const fromIdx = c.members.findIndex(m=>m.id===vtDrag.memberId);
      const toIdx = c.members.findIndex(m=>m.id===row.dataset.member);
      if(fromIdx<0||toIdx<0||fromIdx===toIdx) return;
      const [moved] = c.members.splice(fromIdx,1);
      c.members.splice(toIdx,0,moved);
      vtSave(); vtRenderGrids();
    });
  });
}

function vtGenderSection(gender,title){
  const list = vtFilteredCommittees(gender);
  const cards = list.length ? list.map(vtCommitteeCard).join('') : `<div class="empty-state">No ${gender} committees ${vtSearch?'match your search':'yet'}.</div>`;
  return `
    <div class="panel">
      <div class="panel-head"><div><h3>${title}</h3><p>${list.length} committee(s)</p></div></div>
      <div class="grid-form">${cards}</div>
    </div>`;
}

function vtCommitteeCard(c){
  const leader = c.members.find(m=>m.role==='leader');
  const autoExpand = !!vtSearch && c.members.some(m=>m.name.toLowerCase().includes(vtSearch));
  const expanded = c.expanded || autoExpand;
  return `
    <div class="list-item" style="flex-direction:column;align-items:stretch;grid-column:1/-1;max-width:520px">
      <div style="display:flex;gap:14px;align-items:center;width:100%">
        <div class="thumb">${c.photo?`<img src="${c.photo}">`:'🛡️'}</div>
        <div class="content" style="cursor:pointer" onclick="vtToggleExpand('${c.id}')">
          <h4>${esc(c.name)} <span style="font-size:10px;color:var(--paper-dim)">${expanded?'▾':'▸'}</span></h4>
          <div class="meta">👑 Leader: ${leader?esc(leader.name):'— none assigned —'} · ${c.members.length} member(s)</div>
        </div>
        <div class="actions">
          <button class="btn btn-sm" onclick="vtOpenMemberForm(null,'${c.id}')">➕ Member</button>
          <button class="btn btn-sm" onclick="vtOpenCommitteeForm('${c.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="vtDeleteCommittee('${c.id}')">🗑️</button>
        </div>
      </div>
      ${expanded ? `
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
        ${c.members.length? c.members.map(m=>vtMemberRow(c,m)).join('') : '<div class="empty-state" style="padding:14px">No members yet.</div>'}
      </div>` : ''}
    </div>`;
}

function vtMemberRow(c,m){
  const otherCommittees = VT.committees.filter(x=>x.id!==c.id);

      <button class="btn" onclick="vtCancelForm()">❌ Cancel</button>
    </div>`;
  panel.scrollIntoView({behavior:'smooth', block:'center'});
}
async function vtSaveMemberForm(){
  const name = val('vt-m-name').trim(); if(!name){ showToast('Volunteer name is required', true); return; }
  const role = document.getElementById('vt-m-role').value;
  const targetCommitteeId = document.getElementById('vt-m-committee').value;
  const fileInput = document.getElementById('vt-m-photo');
  const applyAndSave = (photo)=>{
    const target = vtCommittee(targetCommitteeId); if(!target) return;
    if(role==='leader'){ target.members.forEach(x=>{ if(x.role==='leader') x.role='volunteer'; }); }
    if(vtEditMemberId){
      let existing=null, oldCommittee=null;
      for(const c of VT.committees){ const f=c.members.find(x=>x.id===vtEditMemberId); if(f){ existing=f; oldCommittee=c; break; } }
      if(existing){
        existing.name=name; existing.role=role; if(photo) existing.photo=photo;
        if(oldCommittee.id!==targetCommitteeId){
          oldCommittee.members = oldCommittee.members.filter(x=>x.id!==vtEditMemberId);
          target.members.push(existing);
        }
      }
    }else{
      target.members.push({id:uid(), name, role, photo:photo||''});
    }
    vtSave(); vtCancelForm(); vtRenderGrids();
  };
  if(fileInput.files && fileInput.files[0]){
    const reader = new FileReader();
    reader.onload = ()=>applyAndSave(reader.result);
    reader.readAsDataURL(fileInput.files[0]);
  }else applyAndSave(null);
}
function vtDeleteMember(committeeId, memberId){
  if(!confirm('Delete this volunteer?')) return;
  const c = vtCommittee(committeeId); if(!c) return;
  c.members = c.members.filter(x=>x.id!==memberId);
  vtSave(); vtCancelForm(); vtRenderGrids();
}
function vtMakeLeader(committeeId, memberId){
  const c = vtCommittee(committeeId); if(!c) return;
  c.members.forEach(m=>{ m.role = (m.id===memberId) ? 'leader' : (m.role==='leader'?'volunteer':m.role); });
  vtSave(); vtRenderGrids();
}
function vtDemoteLeader(committeeId, memberId){
  const c = vtCommittee(committeeId); if(!c) return;
  const m = c.members.find(x=>x.id===memberId); if(m) m.role='volunteer';
  vtSave(); vtRenderGrids();
}
function vtMoveMember(committeeId, memberId, targetId){
  if(!targetId) return;
  const from = vtCommittee(committeeId), to = vtCommittee(targetId);
  if(!from||!to) return;
  const idx = from.members.findIndex(x=>x.id===memberId); if(idx<0) return;
  const [m] = from.members.splice(idx,1);
  to.members.push(m);
  vtSave(); vtRenderGrids();
}
function vtCancelForm(){
  vtFormMode=null; vtEditCommitteeId=null; vtEditMemberId=null;
  const panel = document.getElementById('vt-form-panel');
  panel.classList.add('hidden'); panel.innerHTML='';
}

function renderGallery(){

      <div class="file-drop" onclick="document.getElementById('gallery-input').click()">Click to upload photos (multiple allowed, up to 50MB each )</div>
      <input type="file" id="gallery-input" accept="image/*" multiple class="hidden" onchange="handleGalleryUpload(event)">
      <div id="gallery-list" style="margin-top:20px"></div>
    </div>`;
  renderGalleryList();
}
function renderGalleryList(){
  const list = document.getElementById('gallery-list');
  if(!DATA.gallery.length){ list.innerHTML = '<div class="empty-state">No photos uploaded yet.</div>'; return; }
  list.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px">` +
    DATA.gallery.map(g=>`
      <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid rgba(232,192,90,0.15)">
        <img src="${g.url}" style="width:100%;height:110px;object-fit:cover;display:block">
        <button class="btn btn-danger btn-sm" style="position:absolute;top:6px;right:6px;padding:4px 9px" onclick="deleteGalleryPhoto('${g.id}')">✕</button>
      </div>`).join('') + `</div>`;
}
function handleGalleryUpload(e){
  const files = Array.from(e.target.files);
  let remaining = files.length;
  if(!remaining) return;
  files.forEach(file=>{
    if(file.size > 50*1024*1024){ showToast(file.name+' too large — skipped', true); remaining--; if(remaining===0) finishGalleryUpload(); return; }
    const reader = new FileReader();
    reader.onload = () => {
      DATA.gallery.push({id:uid(), url:reader.result, caption:file.name});
      remaining--;
      if(remaining===0) finishGalleryUpload();
    };
    reader.readAsDataURL(file);
  });
}
async function finishGalleryUpload(){
  await saveData('gallery-photos', DATA.gallery);
  renderGalleryList();
}
async function deleteGalleryPhoto(id){
  DATA.gallery = DATA.gallery.filter(g=>g.id!==id);
  await saveData('gallery-photos', DATA.gallery);
  renderGalleryList();
}

}
async function saveContact(){
  DATA.contact = {
    email: val('ct-email'),
    facultyCoordinators: parseCoordinators(val('ct-faculty')),
    studentCoordinators: parseCoordinators(val('ct-student')),
    emergencyNumbers: val('ct-emergency').split(',').map(s=>s.trim()).filter(Boolean)
  };
  await saveData('contact-info', DATA.contact);
}

async function saveSettings(){

    themeGold: document.getElementById('st-gold').value, themePurple: document.getElementById('st-purple').value, themeBlue: document.getElementById('st-blue').value,

/* ---------- UTILS ---------- */
function val(id){ return document.getElementById(id).value; }
function esc(str){ return (str===undefined||str===null?'':String(str)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toLocalInput(iso){
  if(!iso) return '';
  try{ const d = new Date(iso); const off = d.getTimezoneOffset(); const local = new Date(d.getTime()-off*60000); return local.toISOString().slice(0,16); }
  catch(e){ return ''; }
}

<!-- ================================================================
     CINEMATIC 3D BACKGROUND + INTRO + MICRO-INTERACTIONS
     Added as a self-contained layer — nothing above this point was
     touched, so all existing dashboard logic keeps working as-is.
================================================================ -->
<script>
/* ---------- INTRO SEQUENCE CONTROL ---------- */
(function(){
  const overlay = document.getElementById('intro-overlay');
  const enterBtn = document.getElementById('introEnterBtn');
  const skipBtn = document.getElementById('introSkipBtn');
  const muteBtn = document.getElementById('introMute');
  let audioCtx=null, ambientNodes=null, muted=false;

  function startAmbient(){
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const master = audioCtx.createGain(); master.gain.value = 0.035; master.connect(audioCtx.destination);
      const o1 = audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value=87.31;
      const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=110.6;
      const lfo = audioCtx.createOscillator(); lfo.frequency.value=0.08;
      const lfoGain = audioCtx.createGain(); lfoGain.gain.value=0.015;
      lfo.connect(lfoGain); lfoGain.connect(master.gain);
      o1.connect(master); o2.connect(master);
      o1.start(); o2.start(); lfo.start();
      ambientNodes = {master,o1,o2,lfo};
    }catch(e){ /* audio unsupported / blocked — fail silently */ }
  }
  function toggleMute(){
    muted = !muted;
    muteBtn.textContent = muted ? '✕' : '♪';
    muteBtn.style.opacity = muted ? '0.35' : '0.6';
    if(ambientNodes) ambientNodes.master.gain.value = muted ? 0 : 0.035;
  }
  function enter(){
    if(!ambientNodes && !muted) startAmbient();
    overlay.classList.add('intro-out');
    setTimeout(()=>{ overlay.style.display='none'; }, 1200);
  }
  enterBtn.addEventListener('click', enter);
  skipBtn.addEventListener('click', enter);
  muteBtn.addEventListener('click', toggleMute);
  // auto-advance if the visitor never taps (still gives time to enjoy the intro)
  setTimeout(()=>{ if(!overlay.classList.contains('intro-out')){ /* leave it up, waiting on tap-to-enter by design */ } }, 9000);
})();

/* ---------- CURSOR GLOW (desktop only) ---------- */
(function(){
  const glow = document.getElementById('cursorGlow');
  if(matchMedia('(hover:none)').matches) return;
  window.addEventListener('pointermove', e=>{
    glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%,-50%)`;
  }, {passive:true});
})();

/* ---------- 3D TILT on cards/panels (pointer devices only) ---------- */
(function(){
  if(matchMedia('(hover:none)').matches) return;
  function attach(){
    document.querySelectorAll('.stat-card, .panel').forEach(el=>{
      if(el.dataset.tiltBound) return;
      el.dataset.tiltBound='1';
      el.classList.add('tilt-el');
      el.addEventListener('mousemove', e=>{
        const r = el.getBoundingClientRect();
        const px = (e.clientX - r.left)/r.width - 0.5;
        const py = (e.clientY - r.top)/r.height - 0.5;
        el.style.transform = `perspective(700px) rotateX(${(-py*4).toFixed(2)}deg) rotateY(${(px*4).toFixed(2)}deg) translateZ(2px)`;
      });
      el.addEventListener('mouseleave', ()=>{ el.style.transform=''; });
    });
  }
  attach();
  // re-attach whenever the admin JS swaps #content-root innerHTML for a new section
  new MutationObserver(attach).observe(document.getElementById('content-root')||document.body, {childList:true, subtree:true});
})();

/* ---------- BUTTON RIPPLE ---------- */
document.addEventListener('click', e=>{
  const el = e.target.closest('.btn, .btn-gold, .btn-solid, .btn-danger, .nav-item');
  if(!el) return;
  const r = el.getBoundingClientRect();
  const size = Math.max(r.width, r.height) * 1.6;
  const dot = document.createElement('span');
  dot.className='ripple-dot';
  dot.style.width = dot.style.height = size+'px';
  dot.style.left = (e.clientX - r.left - size/2)+'px';
  dot.style.top = (e.clientY - r.top - size/2)+'px';
  el.appendChild(dot);
  setTimeout(()=>dot.remove(), 650);
});
</script>

<script>
/* ---------- CINEMATIC 3D BACKDROP (three.js, classic global build — works over file:// too) ---------- */
(function(){
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const canvas = document.getElementById('bg3d-canvas');
if(!canvas || reduceMotion || typeof THREE === 'undefined') return;
const EffectComposer = THREE.EffectComposer, RenderPass = THREE.RenderPass, UnrealBloomPass = THREE.UnrealBloomPass;
if(!EffectComposer || !RenderPass || !UnrealBloomPass) return; // library failed to load — background quietly stays plain
  const isSmall = innerWidth < 720;
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050208, 0.028);

  const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0, 0.6, 9);

  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio, isSmall ? 1.5 : 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor(0x050208, 1);
  renderer.outputEncoding = THREE.sRGBEncoding;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), isSmall?0.55:0.85, 0.7, 0.15);
  composer.addPass(bloom);

  /* ---------- lighting ---------- */
  scene.add(new THREE.AmbientLight(0x2a1840, 0.7));
  const spotTop = new THREE.SpotLight(0xfff3d0, 3.2, 30, Math.PI/5, 0.6, 1.4);
  spotTop.position.set(0, 10, 2); scene.add(spotTop);
  const goldRim = new THREE.PointLight(0xE8C05A, 2.4, 18); goldRim.position.set(4,2,3); scene.add(goldRim);
  const purpleSide = new THREE.PointLight(0x7C3FC9, 2.6, 20); purpleSide.position.set(-5,-1,-2); scene.add(purpleSide);
  const blueAmbient = new THREE.PointLight(0x3FC7E8, 2.0, 20); blueAmbient.position.set(0,-3,-6); scene.add(blueAmbient);

  /* ---------- reflective luxury floor ---------- */
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60,60),
    new THREE.MeshStandardMaterial({color:0x0d0818, metalness:0.9, roughness:0.15})
  );
  floor.rotation.x = -Math.PI/2; floor.position.y = -3.2; scene.add(floor);

  /* ---------- floating gold rings ---------- */
  const ringGroup = new THREE.Group();
  const ringMat = new THREE.MeshStandardMaterial({color:0xE8C05A, metalness:1, roughness:0.25, emissive:0x3a2400, emissiveIntensity:0.4});
  for(let i=0;i<(isSmall?4:7);i++){
    const r = 0.9 + Math.random()*1.3;
    const ring = new THREE.Mesh(new THREE.TorusGeometry(r, r*0.04, 16, 64), ringMat);
    ring.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*6, (Math.random()-0.5)*8-2);
    ring.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
    ring.userData.speed = 0.05 + Math.random()*0.08;
    ring.userData.float = Math.random()*Math.PI*2;
    ringGroup.add(ring);
  }
  scene.add(ringGroup);

  /* ---------- floating glass crystals ---------- */
  const crystalGroup = new THREE.Group();
  const crystalMat = new THREE.MeshPhysicalMaterial({
    color:0xbfe9ff, transparent:true, opacity:0.35, roughness:0.05, metalness:0,
    transmission:0.9, thickness:1.2, ior:1.4, clearcoat:1
  });
  for(let i=0;i<(isSmall?5:9);i++){
    const s = 0.25 + Math.random()*0.4;
    const gem = new THREE.Mesh(new THREE.IcosahedronGeometry(s,0), crystalMat);
    gem.position.set((Math.random()-0.5)*12, (Math.random()-0.5)*7, (Math.random()-0.5)*9-2);
    gem.userData.speed = 0.1 + Math.random()*0.15;
    gem.userData.float = Math.random()*Math.PI*2;
    crystalGroup.add(gem);
  }
  scene.add(crystalGroup);

  /* ---------- holographic circular elements ---------- */
  const holoGroup = new THREE.Group();
  const holoMat = new THREE.MeshBasicMaterial({color:0x7C3FC9, transparent:true, opacity:0.22, side:THREE.DoubleSide, blending:THREE.AdditiveBlending});
  for(let i=0;i<(isSmall?3:5);i++){
    const ring = new THREE.Mesh(new THREE.RingGeometry(0.6+i*0.05, 0.66+i*0.05, 48), holoMat);
    ring.position.set((Math.random()-0.5)*6, (Math.random()-0.5)*3, -3-Math.random()*3);
    holoGroup.add(ring);
  }
  scene.add(holoGroup);

  /* ---------- energy particles / sparkles ---------- */
  const PARTICLES = isSmall ? 400 : 900;
  const positions = new Float32Array(PARTICLES*3);
  for(let i=0;i<PARTICLES;i++){
    positions[i*3]   = (Math.random()-0.5)*30;
    positions[i*3+1] = (Math.random()-0.5)*18;
    positions[i*3+2] = (Math.random()-0.5)*30;
  }
  const partGeo = new THREE.BufferGeometry();
  partGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const partMat = new THREE.PointsMaterial({color:0xFFE9A8, size:0.02, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false});
  const particles = new THREE.Points(partGeo, partMat);
  scene.add(particles);

  /* ---------- pointer / gyro parallax ---------- */
  let targetX=0, targetY=0, curX=0, curY=0;
  window.addEventListener('pointermove', e=>{
    targetX = (e.clientX/innerWidth - 0.5);
    targetY = (e.clientY/innerHeight - 0.5);
  }, {passive:true});
  function enableGyro(){
    window.addEventListener('deviceorientation', e=>{
      if(e.gamma===null) return;
      targetX = Math.max(-0.5,Math.min(0.5, e.gamma/45));
      targetY = Math.max(-0.5,Math.min(0.5, (e.beta-45)/90));
    }, {passive:true});
  }
  if(isSmall && typeof DeviceOrientationEvent !== 'undefined'){
    if(typeof DeviceOrientationEvent.requestPermission === 'function'){
      document.body.addEventListener('click', function reqOnce(){
        DeviceOrientationEvent.requestPermission().then(p=>{ if(p==='granted') enableGyro(); }).catch(()=>{});
        document.body.removeEventListener('click', reqOnce);
      }, {once:true});
    } else enableGyro();
  }

  /* ---------- animation loop (slow cinematic motion) ---------- */
  const clock = new THREE.Clock();
  let paused = false;
  document.addEventListener('visibilitychange', ()=>{ paused = document.hidden; });

  function animate(){
    requestAnimationFrame(animate);
    if(paused) return;
    const t = clock.getElapsedTime();

    ringGroup.children.forEach(r=>{
      r.rotation.x += r.userData.speed*0.006;
      r.rotation.y += r.userData.speed*0.004;
      r.position.y += Math.sin(t*0.3 + r.userData.float)*0.0009;
    });
    crystalGroup.children.forEach(g=>{
      g.rotation.x += g.userData.speed*0.004;
      g.rotation.y += g.userData.speed*0.006;
      g.position.y += Math.sin(t*0.4 + g.userData.float)*0.0011;
    });
    holoGroup.children.forEach((h,i)=>{ h.rotation.z += 0.0015*(i%2===0?1:-1); });
    particles.rotation.y += 0.0004;

    // gentle automatic cinematic camera drift + parallax
    curX += (targetX-curX)*0.03; curY += (targetY-curY)*0.03;
    camera.position.x = Math.sin(t*0.05)*1.2 + curX*1.4;
    camera.position.y = 0.6 + Math.cos(t*0.04)*0.4 - curY*1.0;
    camera.position.z = 9 + Math.sin(t*0.03)*0.6;
    camera.lookAt(0,0,-2);

    goldRim.intensity = 2.2 + Math.sin(t*0.6)*0.4;
    purpleSide.intensity = 2.4 + Math.cos(t*0.5)*0.4;

    composer.render();
  }
  animate();

  window.addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
})();
</script>
